<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#0d0f14"/>
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <defs>
