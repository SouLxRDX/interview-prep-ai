    <circle cx="12.5" cy="14.5" r="1" fill="#fff" stroke="none"/>
    <circle cx="19.5" cy="14.5" r="1" fill="#fff" stroke="none"/>
    <circle cx="12" cy="20" r="1" fill="#fff" stroke="none"/>
    <circle cx="20" cy="20" r="1" fill="#fff" stroke="none"/>
    <!-- connections -->
    <line x1="12.5" y1="14.5" x2="16" y2="16" stroke-opacity="0.6" stroke-width="1"/>
    <line x1="19.5" y1="14.5" x2="16" y2="16" stroke-opacity="0.6" stroke-width="1"/>
    <line x1="12" y1="20" x2="16" y2="18.5" stroke-opacity="0.6" stroke-width="1"/>
    <line x1="20" y1="20" x2="16" y2="18.5" stroke-opacity="0.6" stroke-width="1"/>
