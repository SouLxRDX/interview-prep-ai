services:
  - type: web
    name: interview-prep-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: OPENROUTER_API_KEYS
        sync: false