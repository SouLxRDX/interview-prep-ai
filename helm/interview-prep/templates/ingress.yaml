apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: interview-prep
  namespace: interview

  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

spec:
  ingressClassName: {{ .Values.ingress.className }}

  tls:
    - hosts:
        - interview-prep.duckdns.org
      secretName: interview-prep-tls

  rules:
    - host: interview-prep.duckdns.org

      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8001

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80