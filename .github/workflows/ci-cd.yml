name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER: interview-eks
  BACKEND_ECR: 206193621702.dkr.ecr.ap-south-1.amazonaws.com/interview-prep-backend
  FRONTEND_ECR: 206193621702.dkr.ecr.ap-south-1.amazonaws.com/interview-prep-frontend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests/ -v 2>/dev/null || echo "No tests found — skipping"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "206193621702"

      - name: Build backend image
        run: docker build -t ${{ env.BACKEND_ECR }}:${{ github.sha }} -t ${{ env.BACKEND_ECR }}:latest ./backend

      - name: Push backend image
        run: |
          docker push ${{ env.BACKEND_ECR }}:${{ github.sha }}
          docker push ${{ env.BACKEND_ECR }}:latest

      - name: Build frontend image
        run: docker build -t ${{ env.FRONTEND_ECR }}:${{ github.sha }} -t ${{ env.FRONTEND_ECR }}:latest ./frontend

      - name: Push frontend image
        run: |
          docker push ${{ env.FRONTEND_ECR }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_ECR }}:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect kubectl to EKS
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Create namespace
        run: kubectl create namespace interview --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          helm upgrade --install interview-prep ./helm/interview-prep \
            --set "backend.image=${{ env.BACKEND_ECR }}:${IMAGE_TAG}" \
            --set "frontend.image=${{ env.FRONTEND_ECR }}:${IMAGE_TAG}" \
            --set "backend.env.GROQ_API_KEY=${GROQ_KEY}" \
            --set "backend.env.GROQ_API_KEY_2=${GROQ_KEY_2}" \
            --set "backend.env.GROQ_API_KEY_3=${GROQ_KEY_3}" \
            --set "backend.env.GEMINI_API_KEY=${GEMINI_KEY}" \
            --set "backend.env.GEMINI_API_KEY_2=${GEMINI_KEY_2}" \
            --namespace interview \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/backend -n interview
          kubectl rollout status deployment/frontend -n interview
          kubectl get pods -n interview

      - name: Get app URL
        run: |
          echo "Waiting for load balancer..."
          sleep 30
          kubectl get ingress -n interview